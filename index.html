<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>コードあてる君 — ギターコード解析</title>
</head>
<body style="margin:0;background:#171311">
<div id="guitar-chord-detector">
  <style>
    #guitar-chord-detector { font-family: ui-rounded, "Hiragino Maru Gothic ProN", system-ui, sans-serif; color: #f7f4ee; background: radial-gradient(circle at 25% 0%, #3d2c22, #171311 48%); min-height: 100vh; padding: 28px; box-sizing: border-box; }
    #guitar-chord-detector * { box-sizing: border-box; }
    .gcd-shell { max-width: 960px; margin: auto; }
    .gcd-header { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:24px; }
    .gcd-brand { display:flex; align-items:center; gap:12px; }
    .gcd-logo { width:42px; height:42px; border-radius:14px; display:grid; place-items:center; font-size:23px; background:#e77b3d; box-shadow:0 8px 24px #e77b3d44; }
    h1 { font-size:21px; margin:0; letter-spacing:.03em; } .gcd-sub { color:#b9aca2; font-size:13px; margin:3px 0 0; }
    .gcd-detail-btn { border:1px solid #685a50; color:#f0e5da; border-radius:100px; padding:8px 13px; font-size:12px; background:transparent; cursor:pointer; } .gcd-detail-btn:hover,.gcd-detail-btn[aria-expanded="true"] { background:#45362e; border-color:#d99a63; }
    .gcd-main { display:grid; grid-template-columns:1.1fr .9fr; gap:16px; }
    .gcd-panel { border:1px solid #4c4039; background:#241d19d9; border-radius:22px; padding:24px; box-shadow:0 16px 45px #0004; }
    .gcd-listening { min-height:385px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
    .gcd-orb { width:154px; height:154px; border-radius:50%; display:grid; place-items:center; background:radial-gradient(circle, #f2a75d 0 7%, #d86c34 8% 31%, #a34b29 32% 46%, #432720 47% 100%); box-shadow:0 0 0 0 #e77b3d33; transition:.18s; position:relative; }
    .gcd-orb.active { animation:pulse 1.4s ease-in-out infinite; } @keyframes pulse { 50% { box-shadow:0 0 0 22px #e77b3d11; transform:scale(1.025); } }
    .gcd-orb span { font-size:50px; filter:drop-shadow(0 2px 2px #0005); }
    .gcd-status { margin:24px 0 8px; font-size:17px; font-weight:700; } .gcd-help { margin:0; color:#baaea4; font-size:13px; max-width:310px; line-height:1.65; }
    .gcd-btn { border:0; border-radius:13px; cursor:pointer; color:#1f160f; background:#f4a35c; font-weight:800; padding:13px 18px; margin-top:19px; font-size:14px; transition:.2s; } .gcd-btn:hover { filter:brightness(1.1); transform:translateY(-1px); } .gcd-btn.stop { background:#c8bbb0; }
    .gcd-label { font-size:12px; color:#aa9d92; letter-spacing:.12em; font-weight:800; }
    .gcd-chord { margin:12px 0 7px; font-size:62px; line-height:1; letter-spacing:-.04em; color:#fff7ec; min-height:62px; }
    .gcd-name { color:#d2c5ba; font-size:14px; min-height:20px; }
    .gcd-confidence { margin-top:26px; } .gcd-meter { height:8px; overflow:hidden; background:#413630; border-radius:999px; margin:9px 0 6px; } .gcd-meter i { display:block; height:100%; width:0%; background:linear-gradient(90deg,#d76438,#f4b25d); border-radius:inherit; transition:width .25s; } .gcd-percent { font-variant-numeric:tabular-nums; color:#bcaea3; font-size:12px; }
    .gcd-notes { display:flex; flex-wrap:wrap; gap:8px; margin:16px 0 25px; min-height:34px; } .gcd-note { border:1px solid #66564b; border-radius:8px; padding:6px 9px; font-weight:700; font-size:13px; color:#e5d7ca; } .gcd-note.hot { border-color:#e77b3d; background:#e77b3d22; color:#ffc595; }
    .gcd-candidates { border-top:1px solid #493d36; padding-top:18px; } .gcd-candidate { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid #382e29; } .gcd-candidate:last-child{border:0} .gcd-rank { width:20px;color:#95877e;font-size:12px; }.gcd-candidate strong{flex:1}.gcd-candidate small{color:#a99a8e}
    .gcd-wave-wrap { margin-top:16px; border:1px solid #493d36; border-radius:16px; overflow:hidden; background:#181311; } #gcd-wave { display:block; width:100%; height:94px; }
    .gcd-detail { margin-top:16px; border:1px solid #4c4039; background:#241d19d9; border-radius:18px; padding:18px; } .gcd-detail[hidden] { display:none; } .gcd-detail-head { display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:10px; } .gcd-detail-head strong{font-size:14px}.gcd-detail-head span{font-size:12px;color:#b9aca2}.gcd-spectrum-wrap{border:1px solid #493d36;border-radius:12px;overflow:hidden;background:#181311}.gcd-spectrum{display:block;width:100%;height:150px}.gcd-detail-flow{display:flex;flex-wrap:wrap;gap:7px;align-items:center;color:#cfc2b7;font-size:12px;margin-top:13px}.gcd-detail-flow b{font-weight:500;color:#f0a65f}.gcd-arrow{color:#8d7d72}
    .gcd-foot { display:flex; gap:8px; align-items:center; margin-top:16px; color:#9c8e84; font-size:12px; } .gcd-dot { width:8px;height:8px;border-radius:50%;background:#75675e; }.gcd-dot.active{background:#70c38a;box-shadow:0 0 10px #70c38a}
    @media(max-width:700px){ #guitar-chord-detector{padding:16px}.gcd-header{align-items:flex-start}.gcd-chip{display:none}.gcd-main{grid-template-columns:1fr}.gcd-listening{min-height:315px}.gcd-chord{font-size:54px} }
  </style>
  <main class="gcd-shell">
    <header class="gcd-header"><div class="gcd-brand"><div class="gcd-logo">♫</div><div><h1>コードあてる君</h1><p class="gcd-sub">ギターコード・リアルタイム解析</p></div></div><button class="gcd-detail-btn" id="gcd-detail-toggle" aria-expanded="false" aria-controls="gcd-detail">詳細</button></header>
    <section class="gcd-main">
      <article class="gcd-panel gcd-listening">
        <div class="gcd-orb" id="gcd-orb"><span>🎸</span></div>
        <div class="gcd-status" id="gcd-status">演奏を聴く準備ができました</div>
        <p class="gcd-help" id="gcd-help">「マイクを開始」を押して許可すると、鳴っているコードを推定します。</p>
        <button class="gcd-btn" id="gcd-toggle">マイクを開始</button>
      </article>
      <article class="gcd-panel">
        <div class="gcd-label">推定コード</div><div class="gcd-chord" id="gcd-chord">—</div><div class="gcd-name" id="gcd-name">入力待ち</div>
        <div class="gcd-confidence"><div class="gcd-label">確信度</div><div class="gcd-meter"><i id="gcd-meter"></i></div><span class="gcd-percent" id="gcd-percent">0%</span></div>
        <div class="gcd-label" style="margin-top:23px">検出した構成音</div><div class="gcd-notes" id="gcd-notes"><span class="gcd-note">—</span></div>
        <div class="gcd-candidates" id="gcd-candidates"><div class="gcd-label">候補</div><div class="gcd-candidate"><span class="gcd-rank">01</span><strong>演奏を待っています</strong><small>—</small></div></div>
      </article>
    </section>
    <section class="gcd-wave-wrap"><canvas id="gcd-wave"></canvas></section>
    <section class="gcd-detail" id="gcd-detail" hidden><div class="gcd-detail-head"><strong>周波数スペクトラム</strong><span>76–500 Hz をコード判定に使用</span></div><div class="gcd-spectrum-wrap"><canvas class="gcd-spectrum" id="gcd-spectrum"></canvas></div><div class="gcd-detail-flow"><b>マイク入力</b><i class="gcd-arrow">→</i><span>強い周波数ピークを抽出</span><i class="gcd-arrow">→</i><span>音名へ変換</span><i class="gcd-arrow">→</i><b>コード候補を照合</b></div></section>
    <div class="gcd-foot"><i class="gcd-dot" id="gcd-dot"></i><span id="gcd-foot">マイクはまだ使用していません</span></div>
  </main>
  <script>
  (() => {
    const $ = id => document.getElementById(id), noteNames = ['C','C♯','D','E♭','E','F','F♯','G','A♭','A','B♭','B'];
    const chordTypes = [{s:'',n:'メジャー',i:[0,4,7]},{s:'m',n:'マイナー',i:[0,3,7]},{s:'add9',n:'アドナインス',i:[0,2,4,7],ext:2,extMin:.45},{s:'7',n:'ドミナント7th',i:[0,4,7,10],ext:10,extMin:.45},{s:'m7',n:'マイナー7th',i:[0,3,7,10],ext:10,extMin:.45},{s:'m7(#5)',n:'マイナー7th・シャープ5th',i:[0,3,8,10],ext:8,extMin:.35},{s:'sus2',n:'サスツー',i:[0,2,7]},{s:'sus4',n:'サスフォー',i:[0,5,7]},{s:'dim',n:'ディミニッシュ',i:[0,3,6]},{s:'aug',n:'オーギュメント',i:[0,4,8]}];
    let ctx, analyser, stream, data, raf, active=false, history=[], heldChord=null, heldUntil=0, latchedChord=null, pendingChord=null, pendingSince=0;
    const canvas=$('gcd-wave'), c=canvas.getContext('2d'), spectrum=$('gcd-spectrum'), sc=spectrum.getContext('2d');
    function resize(){ canvas.width=canvas.clientWidth*devicePixelRatio; canvas.height=canvas.clientHeight*devicePixelRatio; c.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); spectrum.width=spectrum.clientWidth*devicePixelRatio; spectrum.height=spectrum.clientHeight*devicePixelRatio; sc.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
    addEventListener('resize',resize); resize();
    function hzToMidi(hz){ return 69+12*Math.log2(hz/440); }
    function scoreChords(pc,bassPc){ const ranked=[]; for(let root=0;root<12;root++) for(const type of chordTypes){ const wanted=type.i.map(v=>(root+v)%12); let hit=0, extra=0, missing=0; pc.forEach((v,i)=>v ? (wanted.includes(i)?hit+=v:extra+=v*.8) : 0); wanted.forEach(i=>{ if((pc[i]||0)<.16) missing++; }); const total=wanted.reduce((a,i)=>a+(pc[i]||0),0), extension=type.ext===undefined?1:(pc[(root+type.ext)%12]||0), weakExtension=type.ext!==undefined&&extension<(type.extMin??.45); if(total>0) ranked.push({root,type,wanted,score: hit/(total+.01)-extra/(total+.01)*.32-(missing/wanted.length)*.42-(weakExtension ? .48 : 0)+(root===bassPc ? .18 : 0),coverage:hit/(wanted.length*.72)}); } return ranked.sort((a,b)=>b.score-a.score); }
    function analyze(){ if(!active)return; analyser.getFloatFrequencyData(data); const binHz=ctx.sampleRate/analyser.fftSize, pc=Array(12).fill(0), peaks=[]; const peakDb=Math.max(...data), floor=Math.max(-82,peakDb-32); let energy=0, bassPeak=null;
      // 周辺より明確に高い実測ピークだけを採用する。倍音を別の基音へ合成しないため、半音ずれを防ぐ。
      for(let i=3;i<data.length-3;i++){ const db=data[i], hz=i*binHz; if(db<floor||hz<76||hz>500) continue; if(db<data[i-1]||db<data[i+1]||db<data[i-2]||db<data[i+2]) continue; const midi=Math.round(hzToMidi(hz)), p=((midi%12)+12)%12, weight=Math.pow(10,(db-floor)/32); pc[p]=Math.max(pc[p],weight); peaks.push({hz,p,db}); energy+=weight; }
      bassPeak=peaks.sort((a,b)=>a.hz-b.hz).find(x=>x.db>=peakDb-20);
      const max=Math.max(...pc, .001); const normalized=pc.map(x=>x/max); const sounding=normalized.map((v,i)=>({i,v})).filter(x=>x.v>.16).sort((a,b)=>b.v-a.v).slice(0,6); history.push(sounding); if(history.length>12)history.shift();
      // 出現回数ではなく相対音量を平均する。小さなノイズを7度・9度と誤認しないための重み付き履歴。
      const stable=Array(12).fill(0); history.flat().forEach(({i,v})=>stable[i]+=v); const present=stable.map(x=>x/history.length); const ranked=scoreChords(present,bassPeak?.p); render(ranked, sounding, energy); draw(); raf=requestAnimationFrame(analyze); }
    function render(ranked,sounding,energy){ let best=ranked[0]; if((!best || energy<.6) && !latchedChord){ $('gcd-chord').textContent='—'; $('gcd-name').textContent='弦を鳴らしてください'; return; }
      const now=performance.now(), complete=ranked.find(x=>x.wanted.every(i=>sounding.some(n=>n.i===i)));
      if(complete){ heldChord={root:complete.root,suffix:complete.type.s}; heldUntil=now+1200; }
      const held=heldChord && ranked.find(x=>x.root===heldChord.root && x.type.s===heldChord.suffix);
      if(held && now<heldUntil && held.score>=best.score-.18) best=held;
      // 演奏のアタック直後に出る倍音由来の候補は確定しない。別候補が続いたときだけ次のコードとして採用する。
      const key=x=>x.root+':'+x.type.s;
      if(energy>=.6){
        if(!latchedChord){ if(!pendingChord||key(pendingChord)!==key(best)){ pendingChord=best; pendingSince=now; } else if(now-pendingSince>150){ latchedChord=best; pendingChord=null; } }
        else if(key(best)!==key(latchedChord)){ if(!pendingChord||key(pendingChord)!==key(best)){ pendingChord=best; pendingSince=now; } else if(now-pendingSince>320){ latchedChord=best; pendingChord=null; } }
        else { pendingChord=null; }
      }
      if(latchedChord) best=latchedChord;
      const pct=Math.max(0,Math.min(96,Math.round(best.score*100))); $('gcd-chord').textContent=noteNames[best.root]+best.type.s; $('gcd-name').textContent=best.type.n; $('gcd-meter').style.width=pct+'%'; $('gcd-percent').textContent=pct+'%';
      $('gcd-notes').innerHTML=sounding.length?sounding.map(x=>`<span class="gcd-note hot">${noteNames[x.i]}</span>`).join(''):'<span class="gcd-note">—</span>';
      $('gcd-candidates').innerHTML='<div class="gcd-label">候補</div>'+ranked.slice(0,3).map((x,i)=>`<div class="gcd-candidate"><span class="gcd-rank">0${i+1}</span><strong>${noteNames[x.root]}${x.type.s}</strong><small>${Math.max(0,Math.round(x.score*100))}%</small></div>`).join('');
    }
    function draw(){ const w=canvas.clientWidth,h=canvas.clientHeight; const time=new Uint8Array(analyser.fftSize); analyser.getByteTimeDomainData(time); c.clearRect(0,0,w,h); c.strokeStyle='#e77b3d'; c.lineWidth=2; c.beginPath(); time.forEach((v,i)=>{const x=i/(time.length-1)*w,y=(v/255)*h; i?c.lineTo(x,y):c.moveTo(x,y);}); c.stroke(); drawSpectrum(); }
    function drawSpectrum(){ if($('gcd-detail').hidden||!data)return; const w=spectrum.clientWidth,h=spectrum.clientHeight, limit=500, maxBin=Math.min(data.length-1,Math.floor(limit/(ctx.sampleRate/analyser.fftSize))); sc.clearRect(0,0,w,h); sc.strokeStyle='#57463c'; sc.lineWidth=1; [0,125,250,375,500].forEach(hz=>{const x=hz/limit*w;sc.beginPath();sc.moveTo(x,0);sc.lineTo(x,h);sc.stroke();sc.fillStyle='#a99a8e';sc.font='11px system-ui';sc.fillText(hz+'Hz',x+4,h-7);}); sc.strokeStyle='#f0a65f';sc.lineWidth=1.5;sc.beginPath();for(let i=0;i<=maxBin;i++){const x=i/maxBin*w, y=h-Math.max(0,Math.min(1,(data[i]+92)/72))*h; i?sc.lineTo(x,y):sc.moveTo(x,y);}sc.stroke(); }
    async function toggle(){ if(active){ active=false; cancelAnimationFrame(raf); stream?.getTracks().forEach(t=>t.stop()); $('gcd-toggle').textContent='マイクを開始'; $('gcd-toggle').classList.remove('stop'); $('gcd-status').textContent='停止しました'; $('gcd-help').textContent='もう一度開始すると解析を再開します。'; $('gcd-orb').classList.remove('active'); $('gcd-dot').classList.remove('active'); $('gcd-foot').textContent='マイクを停止しました'; return; }
      try { stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}}); ctx=new (window.AudioContext||window.webkitAudioContext)(); const src=ctx.createMediaStreamSource(stream); analyser=ctx.createAnalyser(); analyser.fftSize=8192; analyser.smoothingTimeConstant=.72; data=new Float32Array(analyser.frequencyBinCount); src.connect(analyser); active=true; history=[]; heldChord=null; heldUntil=0; latchedChord=null; pendingChord=null; pendingSince=0; $('gcd-toggle').textContent='解析を停止'; $('gcd-toggle').classList.add('stop'); $('gcd-status').textContent='聴いています…'; $('gcd-help').textContent='コードを1〜2秒ほど自然に鳴らしてください。'; $('gcd-orb').classList.add('active'); $('gcd-dot').classList.add('active'); $('gcd-foot').textContent='マイクを解析中'; analyze(); }
      catch(e){ $('gcd-status').textContent='マイクを開始できませんでした'; $('gcd-help').textContent='ブラウザのマイク許可を確認して、HTTPS または localhost で開いてください。'; }
    }
    $('gcd-toggle').addEventListener('click',toggle);
    $('gcd-detail-toggle').addEventListener('click',()=>{ const detail=$('gcd-detail'), open=detail.hidden; detail.hidden=!open; $('gcd-detail-toggle').setAttribute('aria-expanded',String(open)); if(open){ resize(); drawSpectrum(); } });
  })();
  </script>
</div>
</body>
</html>
